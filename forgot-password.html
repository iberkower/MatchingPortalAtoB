<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AtoBe Startups - Reset Password</title>
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <div class="split-layout">
        <div class="split-left">
            <h1>Log in to AtoBe<br>Startups</h1>
            <p>Connect with the mentors<br>who will help your startup succeed.</p>
        </div>

        <div class="split-right">
            <div class="card">
                <h2 class="card-title">Reset password</h2>
                <p class="card-subtitle">Enter the email address associated with your account and we'll send you a link
                    to reset your password.</p>

                <form action="#" style="margin-top: 2rem;" id="resetForm">
                    <div class="form-group" style="margin-bottom: 2rem;">
                        <label class="form-label" for="email">Email Address</label>
                        <input type="email" id="email" class="form-control" placeholder="john.doe@gmail.com" required>
                    </div>

                    <button type="submit" class="btn btn-primary btn-block">Email reset link</button>
                </form>

                <div style="margin-top: 2rem; text-align: center; font-size: 0.875rem; color: var(--text-muted);">
                    Back to <a href="login.html" style="font-weight: 600;">Log in</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('resetForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            alert('If an account exists for ' + email + ', you will receive a password reset link shortly.');
            window.location.href = 'login.html';
        });
    </script>
</body>

</html>
