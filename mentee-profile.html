<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AtoB Startups - Mentee Profile</title>
  <link rel="stylesheet" href="index.css">
  <script>
    function togglePill(element) {
      element.classList.toggle('active');
    }
  </script>
</head>
<body class="setup-layout">
  
  <header class="setup-header">
    <a href="index.html" class="logo">AtoB Startups</a>
    <div class="step-indicator">Step 2 of 2 &mdash; Complete Your Mentee Profile</div>
  </header>

  <main class="setup-content">
    <div class="setup-card">
      <h1 class="card-title">Mentee Profile</h1>
      <p class="card-subtitle">Tell us about yourself and your startup so we can find the best mentors for you.</p>

      <form action="index.html">
        
        <!-- About You -->
        <h2 class="section-title">About You</h2>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="fullname">Full Name</label>
            <input type="text" id="fullname" class="form-control" placeholder="Your name">
          </div>
          <div class="form-group">
            <label class="form-label" for="location">Location</label>
            <input type="text" id="location" class="form-control" placeholder="City, State">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="linkedin">LinkedIn Profile URL</label>
          <input type="url" id="linkedin" class="form-control" placeholder="https://linkedin.com/in/yourname">
        </div>

        <!-- Your Startup -->
        <h2 class="section-title">Your Startup</h2>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="startup-name">Startup Name</label>
            <input type="text" id="startup-name" class="form-control" placeholder="What is your company called?">
          </div>
          <div class="form-group">
            <label class="form-label" for="startup-stage">Startup Stage</label>
            <select id="startup-stage" class="form-control">
              <option>Idea Stage</option>
              <option>MVP</option>
              <option>Seed/Early Revenue</option>
              <option>Growth</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="industry">Primary Industry</label>
            <select id="industry" class="form-control">
              <option>Select industry</option>
              <option>SaaS</option>
              <option>E-commerce</option>
              <option>Fintech</option>
              <option>Healthtech</option>
              <option>Other</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label" for="model">Business Model</label>
            <select id="model" class="form-control">
              <option>Select model (B2B, B2C...)</option>
              <option>B2B</option>
              <option>B2C</option>
              <option>Marketplace</option>
              <option>Hardware</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="idea-desc">Describe Your Startup Idea</label>
          <textarea id="idea-desc" class="form-control" placeholder="What problem are you solving? Who is your target customer?"></textarea>
        </div>

        <!-- Needs -->
        <h2 class="section-title">What You Need from a Mentor</h2>
        <label class="form-label">Skills Needed (select all that apply)</label>
        <div class="pills-container">
          <div class="pill active" onclick="togglePill(this)">AI / ML</div>
          <div class="pill" onclick="togglePill(this)">Marketing</div>
          <div class="pill" onclick="togglePill(this)">Fundraising</div>
          <div class="pill" onclick="togglePill(this)">Product</div>
          <div class="pill" onclick="togglePill(this)">Sales</div>
          <div class="pill" onclick="togglePill(this)">Finance</div>
          <div class="pill" onclick="togglePill(this)">Legal</div>
          <div class="pill" onclick="togglePill(this)">Operations</div>
        </div>
        
        <div class="form-group">
          <label class="form-label" for="challenge">Biggest Current Challenge</label>
          <textarea id="challenge" class="form-control" placeholder="e.g. Finding product-market fit, building my team..."></textarea>
        </div>
        <div class="form-group">
          <label class="form-label" for="action-taken">Have you already taken action on this issue?</label>
          <textarea id="action-taken" class="form-control" placeholder="e.g. Finding product-market fit, building my team..."></textarea>
        </div>
        <div class="form-group">
          <label class="form-label" for="success">What would success look like from a mentor?</label>
          <textarea id="success" class="form-control" placeholder="e.g. Finding product-market fit, building my team..."></textarea>
        </div>
        <div class="form-group">
          <label class="form-label" for="help-match">Anything else that would help us match you correctly?</label>
          <textarea id="help-match" class="form-control" placeholder="e.g. Finding product-market fit, building my team..."></textarea>
        </div>

        <!-- Mentor Preferences -->
        <h2 class="section-title">Mentor Preferences</h2>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="freq">Preferred Meeting Frequency</label>
            <select id="freq" class="form-control">
              <option>Weekly</option>
              <option>Bi-weekly</option>
              <option>Monthly</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label" for="len">Session Length</label>
            <select id="len" class="form-control">
              <option>30 min</option>
              <option>45 min</option>
              <option>60 min</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label" for="format">Meeting Format</label>
            <select id="format" class="form-control">
              <option>Video Call</option>
              <option>Phone Call</option>
              <option>In-person</option>
            </select>
          </div>
        </div>
        <div class="form-group" style="margin-bottom: 2rem;">
          <label class="form-label" for="goals">Goals for This Mentorship</label>
          <textarea id="goals" class="form-control" placeholder="e.g. Finding product-market fit, building my team..."></textarea>
        </div>

        <button type="submit" class="btn btn-primary btn-block">Save Profile & Find Mentors</button>
      </form>
      
    </div>
  </main>
</body>
</html>
