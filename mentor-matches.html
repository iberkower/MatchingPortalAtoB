<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AtoBe Startups - Your Mentor Matches</title>
  <link rel="stylesheet" href="index.css">
</head>

<body style="min-height: 100vh;">

  <header class="dashboard-header">
    <a href="index.html" class="logo">AtoBe Startups</a>
    <div class="user-profile-nav">
      First name Last name <span class="avatar-icon"></span>
    </div>
  </header>

  <main style="padding: 3rem 2rem;">
    <div style="max-width: 1100px; margin: 0 auto; margin-bottom: 2rem;">
      <h1 style="font-size: 2rem; margin-bottom: 0.5rem;">Your Mentor Matches</h1>
      <p class="text-muted" id="matches-subtitle">Loading your mentor matches...</p>
    </div>

    <div class="matches-grid" id="matches-container">
    </div>

    <div style="max-width: 1100px; margin: 2rem auto; font-size: 0.75rem; color: var(--text-muted);">
      * Mentor identities are hidden until you connect. You have 72 hours to select a mentor before new matches are
      generated.
    </div>

  </main>

  <script src="auth-shared.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const token = localStorage.getItem('atobeToken');
      if (!token) {
        window.location.href = 'login.html';
        return;
      }

      const container = document.getElementById('matches-container');
      const subtitle = document.getElementById('matches-subtitle');

      try {
        const response = await fetch('/api/matches', {
          headers: { 'Authorization': `Bearer ${token}` }
        });

        if (!response.ok) {
          throw new Error('Failed to fetch matches');
        }

        const matches = await response.json();
        
        if (matches.length === 0) {
          subtitle.textContent = "We couldn't find any mentors that match your profile yet.";
          container.innerHTML = "";
          return;
        }

        subtitle.textContent = `We found ${matches.length} mentors who match your profile. Select one to send a connection request.`;
        container.innerHTML = "";

        matches.forEach((match, index) => {
            let domainsStr = "General";
            try {
                const domains = JSON.parse(match.domains || '[]');
                if (domains.length > 0) domainsStr = domains.slice(0,2).join(', ');
            } catch(e){}

            let skillsStr = "Mentorship";
            try {
                const skills = JSON.parse(match.skills || '[]');
                if (skills.length > 0) skillsStr = skills.slice(0,3).join(' &middot; ');
            } catch(e){}

            const isTopMatch = index === 0;
            const borderStyle = isTopMatch ? 'style="border: 2px solid var(--primary-blue);"' : '';
            const badgeStyle = isTopMatch ? 'style="background-color: var(--primary-blue); color: white;"' : '';

            const card = `
              <div class="match-card" ${borderStyle}>
                <div class="match-badge" ${badgeStyle}>${match.matchPercentage}% match</div>
                <div class="match-header">
                  <div class="match-avatar"></div>
                  <div>
                    <h3 style="margin-bottom: 0;">Mentor #${index + 1}</h3>
                    <span class="text-muted" style="font-size: 0.875rem;">${domainsStr}</span>
                  </div>
                </div>

                <div style="flex: 1;">
                  <div class="match-info-section">
                    <div class="match-info-label">Current Role</div>
                    <div class="match-info-value">${match.current_role} at ${match.company}</div>
                  </div>
                  <div class="match-info-section">
                    <div class="match-info-label">Background</div>
                    <div class="match-info-value">${match.experience || 'N/A'}</div>
                  </div>
                  <div class="match-info-section">
                    <div class="match-info-label">Key Skills</div>
                    <div class="match-info-value">${skillsStr}</div>
                  </div>
                </div>

                <a href="match-confirmed.html" class="btn btn-primary btn-block" style="margin-top: 1rem;">Select This Mentor</a>
              </div>
            `;
            container.innerHTML += card;
        });

      } catch (err) {
        console.error(err);
        subtitle.textContent = "An error occurred while loading your matches.";
      }
    });
  </script>
</body>

</html>
